<!--
  ポモドーロタイマー メイン画面テンプレート
  Jinja2で動的データを埋め込む想定
-->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポモドーロタイマー</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <div class="window-header">
            <span class="title">ポモドーロタイマー</span>
            <div class="window-controls">
                <span class="minimize">-</span>
                <span class="square">□</span>
                <span class="close">×</span>
            </div>
        </div>
        <div class="timer-section">
            <div class="timer-circle">
                <!-- 円形プログレスバーは後でJS/CSSで実装 -->
                <svg width="180" height="180">
                    <circle cx="90" cy="90" r="80" stroke="#e5e7eb" stroke-width="14" fill="none" />
                    <circle cx="90" cy="90" r="80" stroke="#7c83ea" stroke-width="14" fill="none" stroke-dasharray="502" stroke-dashoffset="0" />
                </svg>
                <div class="timer-label">
                    <div class="timer-state">作業中</div>
                    <div class="timer-time">25:00</div>
                </div>
            </div>
            <div class="timer-buttons">
                <button class="start-btn">開始</button>
                <button class="reset-btn">リセット</button>
            </div>
        </div>
        <div class="progress-section">
            <div class="progress-box">
                <div class="progress-title">今日の進捗</div>
                <div class="progress-stats">
                    <div class="progress-done">
                        <span class="progress-count">4</span>
                        <span class="progress-label">完了</span>
                    </div>
                    <div class="progress-time">
                        <span class="progress-total">1時間40分</span>
                        <span class="progress-label">集中時間</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/js/timer.js"></script>
</body>
</html>
